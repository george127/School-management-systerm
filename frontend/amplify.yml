version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd frontend  # or whatever your frontend folder is named
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/build  # adjust based on your build output
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    appRoot: frontend  # path to your frontend app
    
  - backend:
      phases:
        preBuild:
          commands:
            - cd backend  # or whatever your backend folder is named
            - npm ci
        build:
          commands:
            - npm run build  # if applicable
      artifacts:
        baseDirectory: backend
        files:
          - '**/*'
      cache:
        paths:
          - backend/node_modules/**/*
    appRoot: backend