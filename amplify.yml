version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd front-end
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: front-end/.next  # Next.js outputs to .next, not build!
    files:
      - '**/*'
  cache:
    paths:
      - front-end/node_modules/**/*
      - front-end/.next/cache/**/*  # This helps speed up future builds